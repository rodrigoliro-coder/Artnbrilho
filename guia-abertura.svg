<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 920" width="700" height="920" font-family="Segoe UI, Arial, sans-serif">

  <!-- Fundo -->
  <rect width="700" height="920" fill="#0d0d0d" rx="18"/>

  <!-- Título -->
  <rect x="0" y="0" width="700" height="80" fill="#1a1a1a" rx="18"/>
  <rect x="0" y="62" width="700" height="18" fill="#1a1a1a"/>
  <text x="350" y="32" text-anchor="middle" fill="#e85d04" font-size="22" font-weight="900">Artnbrilho</text>
  <text x="350" y="58" text-anchor="middle" fill="#888" font-size="13">Como abrir o programa – Passo a passo</text>

  <!-- ── PASSO 1 ── -->
  <rect x="30" y="100" width="640" height="150" fill="#1a1a1a" rx="12" stroke="#2e2e2e" stroke-width="1"/>
  <!-- número -->
  <circle cx="72" cy="140" r="22" fill="#e85d04"/>
  <text x="72" y="147" text-anchor="middle" fill="white" font-size="18" font-weight="900">1</text>
  <!-- texto -->
  <text x="110" y="133" fill="#f0f0f0" font-size="16" font-weight="700">Baixe o arquivo</text>
  <text x="110" y="155" fill="#888" font-size="12">Clique no arquivo index.html enviado nesta conversa</text>
  <text x="110" y="172" fill="#888" font-size="12">e escolha "Baixar" / "Download".</text>
  <!-- ícone arquivo -->
  <rect x="530" y="112" width="110" height="126" fill="#242424" rx="8"/>
  <rect x="555" y="135" width="60" height="70" fill="#1a1a1a" rx="6" stroke="#e85d04" stroke-width="2"/>
  <rect x="555" y="135" width="60" height="18" fill="#e85d04" rx="4"/>
  <text x="585" y="148" text-anchor="middle" fill="white" font-size="9" font-weight="700">HTML</text>
  <text x="560" y="175" fill="#888" font-size="9">index.html</text>
  <text x="560" y="188" fill="#888" font-size="9">4 KB</text>
  <!-- seta download -->
  <line x1="585" y1="208" x2="585" y2="218" stroke="#2ecc71" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="578,215 592,215 585,224" fill="#2ecc71"/>
  <text x="585" y="234" text-anchor="middle" fill="#2ecc71" font-size="9" font-weight="700">Salvar</text>

  <!-- ── PASSO 2 ── -->
  <rect x="30" y="268" width="640" height="150" fill="#1a1a1a" rx="12" stroke="#2e2e2e" stroke-width="1"/>
  <circle cx="72" cy="308" r="22" fill="#e85d04"/>
  <text x="72" y="315" text-anchor="middle" fill="white" font-size="18" font-weight="900">2</text>
  <text x="110" y="301" fill="#f0f0f0" font-size="16" font-weight="700">Encontre o arquivo baixado</text>
  <text x="110" y="323" fill="#888" font-size="12">Abra a pasta Downloads do seu computador.</text>
  <text x="110" y="340" fill="#888" font-size="12">Procure pelo arquivo  index.html</text>
  <!-- pasta downloads -->
  <rect x="520" y="278" width="130" height="130" fill="#242424" rx="8"/>
  <!-- pasta -->
  <rect x="535" y="300" width="100" height="70" fill="#f39c12" rx="5"/>
  <rect x="535" y="293" width="50" height="14" fill="#e67e22" rx="3"/>
  <!-- arquivo dentro -->
  <rect x="558" y="315" width="32" height="40" fill="white" rx="3"/>
  <rect x="558" y="315" width="32" height="10" fill="#e85d04" rx="3"/>
  <text x="574" y="322" text-anchor="middle" fill="white" font-size="6" font-weight="700">HTML</text>
  <text x="574" y="368" text-anchor="middle" fill="#1a1a1a" font-size="9" font-weight="700">Downloads</text>

  <!-- ── PASSO 3 ── -->
  <rect x="30" y="436" width="640" height="150" fill="#1a1a1a" rx="12" stroke="#2e2e2e" stroke-width="1"/>
  <circle cx="72" cy="476" r="22" fill="#e85d04"/>
  <text x="72" y="483" text-anchor="middle" fill="white" font-size="18" font-weight="900">3</text>
  <text x="110" y="469" fill="#f0f0f0" font-size="16" font-weight="700">Abra no navegador</text>
  <text x="110" y="491" fill="#888" font-size="12">Dê um duplo clique no arquivo index.html.</text>
  <text x="110" y="508" fill="#888" font-size="12">Ele abrirá automaticamente no seu navegador.</text>
  <text x="110" y="530" fill="#2ecc71" font-size="11">✓ Chrome   ✓ Edge   ✓ Firefox   ✓ Safari</text>
  <!-- ícones navegadores -->
  <rect x="520" y="446" width="130" height="130" fill="#242424" rx="8"/>
  <!-- Chrome -->
  <circle cx="560" cy="486" r="16" fill="#4285F4"/>
  <circle cx="560" cy="486" r="8" fill="white"/>
  <circle cx="560" cy="486" r="5" fill="#4285F4"/>
  <!-- Edge -->
  <circle cx="600" cy="486" r="16" fill="#0078D4"/>
  <text x="600" y="491" text-anchor="middle" fill="white" font-size="14" font-weight="900">e</text>
  <!-- Firefox -->
  <circle cx="560" cy="526" r="16" fill="#FF6611"/>
  <circle cx="560" cy="526" r="9" fill="#FFD700"/>
  <!-- double click -->
  <text x="600" y="522" text-anchor="middle" fill="#888" font-size="9">2× clique</text>
  <text x="600" y="536" text-anchor="middle" fill="#e85d04" font-size="20">👆</text>

  <!-- ── PASSO 4 ── -->
  <rect x="30" y="604" width="640" height="150" fill="#1a1a1a" rx="12" stroke="#2e2e2e" stroke-width="1"/>
  <circle cx="72" cy="644" r="22" fill="#2ecc71"/>
  <text x="72" y="651" text-anchor="middle" fill="white" font-size="18" font-weight="900">4</text>
  <text x="110" y="637" fill="#f0f0f0" font-size="16" font-weight="700">Faça login</text>
  <text x="110" y="659" fill="#888" font-size="12">Use as credenciais abaixo para o primeiro acesso:</text>
  <!-- credenciais destaque -->
  <rect x="110" y="670" width="180" height="34" fill="#242424" rx="7" stroke="#e85d04" stroke-width="1.5"/>
  <text x="120" y="683" fill="#888" font-size="10">Usuário</text>
  <text x="120" y="697" fill="#ffba08" font-size="14" font-weight="800">admin</text>
  <rect x="305" y="670" width="180" height="34" fill="#242424" rx="7" stroke="#e85d04" stroke-width="1.5"/>
  <text x="315" y="683" fill="#888" font-size="10">Senha</text>
  <text x="315" y="697" fill="#ffba08" font-size="14" font-weight="800">admin123</text>
  <text x="110" y="733" fill="#f39c12" font-size="11">⚠ Troque a senha após o primeiro acesso!</text>
  <!-- tela login mini -->
  <rect x="524" y="616" width="122" height="126" fill="#0d0d0d" rx="6" stroke="#2e2e2e" stroke-width="1"/>
  <rect x="534" y="626" width="102" height="14" fill="#e85d04" rx="3"/>
  <text x="585" y="637" text-anchor="middle" fill="white" font-size="7" font-weight="700">Artnbrilho</text>
  <rect x="534" y="648" width="102" height="16" fill="#242424" rx="3"/>
  <text x="540" y="660" fill="#888" font-size="8">admin</text>
  <rect x="534" y="670" width="102" height="16" fill="#242424" rx="3"/>
  <text x="540" y="682" fill="#888" font-size="8">••••••••</text>
  <rect x="534" y="692" width="102" height="18" fill="#e85d04" rx="3"/>
  <text x="585" y="704" text-anchor="middle" fill="white" font-size="8" font-weight="700">Entrar</text>
  <text x="560" y="725" fill="#888" font-size="7">Criar conta</text>
  <text x="610" y="725" fill="#888" font-size="7">Esqueci</text>

  <!-- ── DICA FINAL ── -->
  <rect x="30" y="774" width="640" height="110" fill="#1a1a1a" rx="12" stroke="#2e2e2e" stroke-width="1"/>
  <rect x="30" y="774" width="5" height="110" fill="#3498db" rx="3"/>
  <text x="55" y="800" fill="#3498db" font-size="13" font-weight="700">💡  Dica importante</text>
  <text x="55" y="820" fill="#888" font-size="12">Os dados ficam salvos no navegador (localStorage).</text>
  <text x="55" y="838" fill="#888" font-size="12">Sempre use o mesmo navegador e computador</text>
  <text x="55" y="856" fill="#888" font-size="12">para não perder produtos, vendas e usuários.</text>
  <text x="55" y="876" fill="#f39c12" font-size="11">Para usar em vários dispositivos → habilite o GitHub Pages.</text>

  <!-- rodapé -->
  <text x="350" y="908" text-anchor="middle" fill="#2e2e2e" font-size="11">Artnbrilho – Sistema de Controle de Estoque e Vendas</text>

</svg>
